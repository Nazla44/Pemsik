<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Mahasiswa</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full bg-gray-100 flex overflow-hidden">

  <!-- Sidebar -->
  <aside class="bg-blue-900 text-white h-screen w-48 flex-shrink-0 flex flex-col">
    <div class="px-6 py-5 border-b border-blue-800">
      <span class="text-xl font-bold">Admin</span>
    </div>
    <nav class="p-3 space-y-1 flex-1">
      <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded text-blue-200 hover:bg-blue-800 transition-colors text-sm">
        <span>🏠</span>
        <span>Dashboard</span>
      </a>
      <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded bg-blue-700 text-white text-sm font-medium">
        <span>🎓</span>
        <span>Mahasiswa</span>
      </a>
    </nav>
  </aside>

  <!-- Main area -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-white shadow-sm flex items-center justify-between px-6 py-4 flex-shrink-0">
      <h1 class="text-xl font-semibold text-gray-800">Mahasiswa</h1>
      <div class="relative">
        <button onclick="toggleProfileMenu()"
          class="w-9 h-9 rounded-full bg-gray-400 hover:bg-gray-500 transition-colors focus:outline-none">
        </button>
        <div id="profileMenu" class="absolute right-0 mt-2 w-40 bg-white rounded-md shadow-lg py-1 hidden z-10 border border-gray-100">
          <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Profile</a>
          <button onclick="logout()" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">Logout</button>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 p-6 overflow-x-auto">
    <div class="bg-white shadow rounded-lg p-4">
        <div class="flex justify-between items-center mb-4">
        <h2 class="text-lg font-semibold">Daftar Mahasiswa</h2>
        <button onclick="openModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
            + Tambah Mahasiswa
        </button>
        </div>
        <table class="w-full text-sm text-gray-700">
        <thead class="bg-blue-600 text-white">
            <tr>
            <th class="py-2 px-4 text-left">NIM</th>
            <th class="py-2 px-4 text-left">Nama</th>
            <th class="py-2 px-4 text-center">Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr class="even:bg-gray-100 odd:bg-white">
            <td class="py-2 px-4">20211002</td>
            <td class="py-2 px-4">Nazla Lutfia Ramadhani</td>
            <td class="py-2 px-4 text-center space-x-2">
                <button class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600" onclick="editMahasiswa(this)">Edit</button>
                <button class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" onclick="deleteMahasiswa(this)">Hapus</button>
            </td>
            </tr>
            <tr class="even:bg-gray-100 odd:bg-white">
            <td class="py-2 px-4">20211003</td>
            <td class="py-2 px-4">Maraleta</td>
            <td class="py-2 px-4 text-center space-x-2">
                <button class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600" onclick="editMahasiswa(this)">Edit</button>
                <button class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" onclick="deleteMahasiswa(this)">Hapus</button>
            </td>
            </tr>
            <tr class="even:bg-gray-100 odd:bg-white">
            <td class="py-2 px-4">20211004</td>
            <td class="py-2 px-4">Mega Berliana</td>
            <td class="py-2 px-4 text-center space-x-2">
                <button class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600" onclick="editMahasiswa(this)">Edit</button>
                <button class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" onclick="deleteMahasiswa(this)">Hapus</button>
            </td>
            </tr>
            <tr class="even:bg-gray-100 odd:bg-white">
            <td class="py-2 px-4">20211005</td>
            <td class="py-2 px-4">Rudi Hartono</td>
            <td class="py-2 px-4 text-center space-x-2">
                <button class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600" onclick="editMahasiswa(this)">Edit</button>
                <button class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" onclick="deleteMahasiswa(this)">Hapus</button>
            </td>
            </tr>
            <tr class="even:bg-gray-100 odd:bg-white">
            <td class="py-2 px-4">20211001</td>
            <td class="py-2 px-4">Teguh Prasetyo</td>
            <td class="py-2 px-4 text-center space-x-2">
                <button class="bg-yellow-500 text-white px-2 py-1 rounded hover:bg-yellow-600" onclick="editMahasiswa(this)">Edit</button>
                <button class="bg-red-500 text-white px-2 py-1 rounded hover:bg-red-600" onclick="deleteMahasiswa(this)">Hapus</button>
            </td>
            </tr>
        </tbody>

        </table>
    </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t text-center py-3 flex-shrink-0">
      <p class="text-xs text-gray-500">© 2025 Admin Dashboard. All rights reserved.</p>
    </footer>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-50 hidden">
  <div class="bg-white rounded-lg shadow-lg w-full max-w-md">
    <div class="flex justify-between items-center p-4 border-b">
      <h2 id="modalTitle" class="text-lg font-semibold">Tambah Mahasiswa</h2>
      <button onclick="closeModal()" class="text-gray-600 hover:text-red-500">&times;</button>
    </div>
    <form id="mahasiswaForm" class="p-4 space-y-4" onsubmit="submitForm(event)">
      <div>
        <label for="nim" class="block text-sm font-medium">NIM</label>
        <input type="text" id="nim" name="nim" required class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-300" />
      </div>
      <div>
        <label for="nama" class="block text-sm font-medium">Nama</label>
        <input type="text" id="nama" name="nama" required class="w-full px-3 py-2 border rounded focus:outline-none focus:ring focus:ring-blue-300" />
      </div>
      <div class="flex justify-end space-x-2">
        <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-400 text-white rounded hover:bg-gray-500">Batal</button>
        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Simpan</button>
      </div>
    </form>
  </div>
</div>

  <script>
  function toggleProfileMenu() {
    document.getElementById('profileMenu').classList.toggle('hidden');
  }

  function logout() {
    alert('Logout berhasil!');
  }

  function openModal(editMode = false, row = null) {
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('mahasiswaForm').reset();
  }

  function closeModal() {
    document.getElementById('modal').classList.add('hidden');
  }

  function submitForm(event) {
    event.preventDefault();
    alert('Mahasiswa berhasil ditambah!');
    closeModal();
  }

  function editMahasiswa(button) {
      alert('Mahasiswa berhasil di-edit! hehe');
  }

  function deleteMahasiswa(button) {
    if (confirm('Apakah Anda yakin ingin menghapus mahasiswa ini?')) {
      alert('Mahasiswa berhasil terhapus!');
    }
  }
</script>
</body>
</html>
